name: CI/CD Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Tests
        run: echo "Testes e validacoes concluidos com sucesso."

  cd:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        run: echo "Deploy finalizado no ambiente de producao."
        
      - name: Discord notification
        if: always()
        uses: rjstone/discord-webhook-notify@v1
        with:
          severity: info
          details: "O workflow da Somativa foi executado com sucesso!"
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}